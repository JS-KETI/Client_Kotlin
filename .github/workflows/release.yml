name: Build APK and Publish Release

# main 브랜치에 push(머지)될 때 debug APK 를 빌드해 GitHub Release 의 자산을 자동 갱신한다.
# Release 태그/자산명을 고정(apk-en-landscape / moqclient-english-landscape-debug.apk)으로 두어
# Notion 등에 걸어둔 다운로드 링크가 항상 "최신 main 빌드"를 가리키게 한다.
#
# 서명: 시크릿(keystore) 없이 돌리기 위해 debug APK 를 배포한다. 운영 배포가 필요하면
# release 서명 키를 GitHub Secrets 로 추가하고 assembleRelease 로 교체하면 된다.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-apk
  cancel-in-progress: true

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant gradlew execute permission
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug --no-daemon

      - name: Publish APK to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          TAG=apk-en-landscape
          ASSET=moqclient-english-landscape-debug.apk
          cp app/build/outputs/apk/debug/app-debug.apk "$ASSET"

          # 릴리즈가 없으면 생성, 있으면 자산만 교체(clobber) → 다운로드 URL 고정 유지
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" \
              --title "MoQ Client — latest main build" \
              --notes "main 최신 자동 빌드" \
              --target "$GITHUB_SHA"
          fi
          gh release upload "$TAG" "$ASSET" --clobber
          gh release edit "$TAG" \
            --notes "main 최신 자동 빌드 · commit ${GITHUB_SHA:0:7} · 빌드 $(date -u '+%Y-%m-%d %H:%M UTC')"

          echo "released $ASSET to tag $TAG (commit ${GITHUB_SHA:0:7})"
